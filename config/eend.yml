data:
  audio_dir: /content/drive/MyDrive/comp6861_project/data/amicorpus
  annotation_dir: /content/drive/MyDrive/comp6861_project/data/ami_public_manual_1.6.2

split:
  train_recordings: [ES2002a, ES2002b, ES2002c]
  val_recordings: [ES2003a]
  test_recordings: [ES2004a]

eend:
  input_dim: 80
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  num_speakers: 4

features:
  n_mels: 80
  sample_rate: 16000

training:
  epochs: 10
  batch_size: 1
  lr: 3e-4
  device: cuda

prediction:
  threshold: 0.5

outputs:
  output_dir: /content/outputs/eend