data:
  audio_dir: data/amicorpus
  annotation_dir: data/ami_public_manual_1.6.2
  recordings: [ES2002a, ES2003a, ES2004a]

evaluation:
  collar: 0.25
  ignore_overlap: true

runtime:
  cache_dir: outputs/cache
  use_cache_values: [false]
  out_csv: outputs/baseline_tuning_results.csv
  summary_csv: outputs/baseline_tuning_summary.csv
  verbose: 1

grid:
  model_types: [ecapa]
  speech_sources: [oracle]

  window_values: [2.0, 3.0]
  hop_values: [1.0, 1.5]

  clustering_values: [kmeans]
  smoothing_values: [1, 3]

  merge_gap_values: [0.25, 0.5]
  min_seg_dur_values: [0.5, 0.75]