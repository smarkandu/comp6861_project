data:
  audio_dir: data/amicorpus
  annotation_dir: data/ami_public_manual_1.6.2

  train_recordings:
    - ES2002a
    - ES2002b
    - ES2005a
    - ES2005b
    - ES2006a
    - ES2006b

  val_recordings:
    - ES2003a
    - ES2004a

  test_recordings:
    - ES2007a
    - ES2008a

features:
  sample_rate: 16000
  n_mels: 80
  hop_length: 160
  num_speakers: 4

runtime:
  verbose: 1
  out_csv: outputs/eend_tuning_results.csv
  summary_csv: outputs/eend_tuning_summary.csv
  model_dir: outputs/models/eend_tuning

grid:
  hidden_dim_values: [64, 128]
  num_layers_values: [1, 2]
  num_heads_values: [4]
  dropout_values: [0.1, 0.2, 0.3]
  lr_values: [0.0001, 0.0003]
  batch_size_values: [1]
  epoch_values: [10, 15]
  patience_values: [3]
  threshold_values: [0.5]